# FILE: configs/config.yaml
featurization:
  session_key: ["ip", "ua"]
  session_gap_seconds: 600
  window: 20
  step: 10

models:
  content_ae:
    hidden_dims: [32, 16, 8]
    bottleneck: 4
  session_lstm_vae:
    latent_dim: 8
    lstm_hidden: 32
    num_layers: 1

thresholds:
  method: percentile
  percentile: 95.0
  fusion_weights: {content: 0.5, session: 0.5}
